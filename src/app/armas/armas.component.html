<section class="page">
  <h1>Armas</h1>

  <div class="search">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar arma</mat-label>
      <input matInput [formControl]="searchControl" placeholder="Ex: espada, leve, 1d8">
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <ng-container *ngIf="weapons$ | async as weapons">
    <section class="block">
      <header class="block-header">
        <h2>Armas</h2>
      </header>

      <section class="weapon-group" *ngFor="let category of weapons.categories">
        <h3>{{ category.name }}</h3>
        <div class="weapon-table">
          <div class="weapon-row weapon-header">
            <span>Nome</span>
            <span>Dano</span>
            <span>Propriedades</span>
            <span>Maestria</span>
            <span>Peso</span>
            <span>Custo</span>
          </div>

          <div class="weapon-row" *ngFor="let weapon of category.weapons">
            <span>{{ weapon.name }}</span>
            <span>{{ weapon.damage }}</span>
            <span>
              <ng-container *ngFor="let token of weapon.propertyTokens; let last = last">
                <ng-container *ngIf="token.key; else plainProperty">
                  <a
                    class="guide-link"
                    [routerLink]="['/guia']"
                    [fragment]="propertyId(lookupProperty(weapons.propertyMap, token)?.name || token.text)"
                    [matTooltip]="formatTooltip(lookupProperty(weapons.propertyMap, token)?.description || '')"
                    matTooltipClass="guide-tooltip"
                  >
                    {{ token.text }}
                  </a>
                </ng-container>
                <ng-template #plainProperty>{{ token.text }}</ng-template>
                <span *ngIf="!last">, </span>
              </ng-container>
            </span>
            <span>
              <ng-container *ngFor="let token of weapon.masteryTokens; let last = last">
                <ng-container *ngIf="token.key; else plainMastery">
                  <a
                    class="guide-link"
                    [routerLink]="['/guia']"
                    [fragment]="masteryId(lookupProperty(weapons.masteryMap, token)?.name || token.text)"
                    [matTooltip]="formatTooltip(lookupProperty(weapons.masteryMap, token)?.description || '')"
                    matTooltipClass="guide-tooltip"
                  >
                    {{ token.text }}
                  </a>
                </ng-container>
                <ng-template #plainMastery>{{ token.text }}</ng-template>
                <span *ngIf="!last">, </span>
              </ng-container>
            </span>
            <span>{{ weapon.weight }}</span>
            <span>{{ weapon.cost }}</span>
          </div>
        </div>
      </section>

      <div class="empty" *ngIf="weapons.categories.length === 0">
        Nenhuma arma encontrada.
      </div>
    </section>
  </ng-container>
</section>
